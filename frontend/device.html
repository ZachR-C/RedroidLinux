<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Device · ReDroid Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="console-body">
  <div class="console">
    <aside class="sidebar">
      <a class="back" href="/">← All devices</a>
      <div id="dev-name" class="dev-name">…</div>
      <div id="dev-serial" class="dev-serial"></div>
      <div id="dev-status" class="dev-status"></div>

      <div class="side-group">
        <div class="side-label">Video player</div>
        <div id="players" class="side-buttons"></div>
        <label class="side-check">
          <input type="checkbox" id="fit-toggle" checked /> Fit to screen
        </label>
      </div>

      <div class="side-group">
        <div class="side-label">Tools (open beside the screen)</div>
        <div class="side-buttons">
          <button data-tool="shell">Shell</button>
          <button data-tool="devtools">Devtools</button>
          <button data-tool="list-files">List files</button>
        </div>
      </div>

      <div class="side-group">
        <div class="side-label">Install APK</div>
        <div id="apk-drop" class="apk-drop">
          <span>Drag an .apk here<br />or click to choose</span>
          <input type="file" id="apk-input" accept=".apk,application/vnd.android.package-archive" hidden />
        </div>
        <p id="apk-status" class="side-hint"></p>
      </div>

      <div class="side-group">
        <div class="side-label">Root</div>
        <div class="side-buttons">
          <button id="root-btn" class="primary">⚡ One-click root (Magisk)</button>
        </div>
        <p id="root-status" class="side-hint"></p>
      </div>

      <div class="side-group">
        <div class="side-label">Stream</div>
        <div class="side-buttons">
          <button id="reload-stream">↻ Reload view</button>
          <a id="open-tab" target="_blank" rel="noopener"><button>Open in new tab ↗</button></a>
        </div>
      </div>

      <div id="side-msg" class="side-msg"></div>
    </aside>

    <main class="stage">
      <div class="stage-stream">
        <iframe id="stream-frame" allow="clipboard-read; clipboard-write; fullscreen"></iframe>
      </div>
      <div id="tool-panel" class="tool-panel hidden">
        <div class="tool-bar">
          <span id="tool-title">Tool</span>
          <span class="spacer"></span>
          <a id="tool-open" target="_blank" rel="noopener" class="ghost">Open in tab ↗</a>
          <button id="tool-close" class="ghost">✕ Close</button>
        </div>
        <iframe id="tool-frame" allow="clipboard-read; clipboard-write"></iframe>
      </div>
    </main>
  </div>
  <script src="device.js"></script>
</body>
</html>
